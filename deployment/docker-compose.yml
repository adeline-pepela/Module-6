services:
  churn-prediction:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-prediction-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend/churn_prediction.db:/app/backend/churn_prediction.db
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./churn_prediction.db
      - MODEL_PATH=../models/best_model.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/dashboard/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
